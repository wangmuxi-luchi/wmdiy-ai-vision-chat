<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理端 — AI 视觉对话助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --green: #3fb950;
      --blue: #58a6ff;
      --red: #f85149;
      --yellow: #d2991d;
      --purple: #a371f7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'PingFang SC', 'Microsoft YaHei', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
    }

    /* 侧边栏 */
    .sidebar {
      width: 280px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex-shrink: 0;
    }

    .sidebar h2 {
      font-size: 16px;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }

    .stat-value.green { color: var(--green); }
    .stat-value.blue { color: var(--blue); }
    .stat-value.purple { color: var(--purple); }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.disconnected {
      background: var(--red);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* 主内容区 */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header .badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .header .badge.live {
      border-color: var(--green);
      color: var(--green);
    }

    /* 事件列表 */
    .event-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .event-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .event-time {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
      min-width: 70px;
      padding-top: 2px;
    }

    .event-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      white-space: nowrap;
      font-weight: 600;
      height: 20px;
      line-height: 18px;
      min-width: 50px;
      text-align: center;
    }

    .event-tag.speech {
      background: rgba(88, 166, 255, 0.15);
      color: var(--blue);
    }

    .event-tag.reply {
      background: rgba(163, 113, 247, 0.15);
      color: var(--purple);
    }

    .event-tag.frame {
      background: rgba(210, 153, 29, 0.15);
      color: var(--yellow);
    }

    .event-tag.connection {
      background: rgba(63, 185, 80, 0.15);
      color: var(--green);
    }

    .event-content {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    .event-session {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* 空状态 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 8px;
    }

    .empty-state .icon {
      font-size: 48px;
      opacity: 0.3;
    }

    /* 底部状态栏 */
    .footer {
      padding: 8px 24px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
    }

    /* 清空按钮 */
    .btn-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-clear:hover {
      background: var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <!-- 侧边栏：统计 -->
  <div class="sidebar">
    <h2>📡 监控面板</h2>

    <div class="status-indicator">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">连接中...</span>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">语音输入</div>
        <div class="stat-value blue" id="speechCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">AI 回复</div>
        <div class="stat-value purple" id="replyCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">画面分析</div>
        <div class="stat-value" id="frameCount" style="color:var(--yellow)">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">在线会话</div>
        <div class="stat-value green" id="sessionCount">0</div>
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-label">最近麦克风输入</div>
      <div class="stat-value" id="lastSpeech" style="font-size:13px;font-weight:400;color:var(--blue)">—</div>
    </div>

    <div class="stat-card">
      <div class="stat-label">最近画面描述</div>
      <div class="stat-value" id="lastFrame" style="font-size:12px;font-weight:400;color:var(--yellow)">—</div>
    </div>

    <button class="btn-clear" onclick="clearEvents()">清空事件列表</button>
  </div>

  <!-- 主内容：事件流 -->
  <div class="main">
    <div class="header">
      <h1>实时事件流</h1>
      <span class="badge live" id="liveBadge">● LIVE</span>
    </div>

    <div class="event-list" id="eventList">
      <div class="empty-state" id="emptyState">
        <div class="icon">🎤</div>
        <div>等待事件...</div>
        <div style="font-size:12px">打开主页面并开始对话，这里将实时显示麦克风输入</div>
      </div>
    </div>

    <div class="footer">
      <span id="footerStatus">等待连接...</span>
      <span id="footerTime"></span>
    </div>
  </div>

  <script>
    const eventList = document.getElementById('eventList');
    const emptyState = document.getElementById('emptyState');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const liveBadge = document.getElementById('liveBadge');
    const footerStatus = document.getElementById('footerStatus');
    const footerTime = document.getElementById('footerTime');

    // 计数器
    let counts = { speech: 0, reply: 0, frame: 0, session: 0 };
    let lastSpeech = '—';
    let lastFrame = '—';
    let eventSource = null;
    let connected = false;

    function updateStats() {
      document.getElementById('speechCount').textContent = counts.speech;
      document.getElementById('replyCount').textContent = counts.reply;
      document.getElementById('frameCount').textContent = counts.frame;
      document.getElementById('sessionCount').textContent = counts.session;
      document.getElementById('lastSpeech').textContent = lastSpeech;
      document.getElementById('lastFrame').textContent = lastFrame;
    }

    function updateTime() {
      const now = new Date();
      footerTime.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
    }

    function formatTime(ts) {
      return new Date(ts).toLocaleTimeString('zh-CN', { hour12: false });
    }

    function getTagInfo(type) {
      switch (type) {
        case 'user_speech': return { label: '🎤 语音', cls: 'speech' };
        case 'assistant_reply': return { label: '🤖 回复', cls: 'reply' };
        case 'frame_analyzed': return { label: '📷 画面', cls: 'frame' };
        case 'session_connected':
        case 'session_disconnected':
          return { label: '🔗 连接', cls: 'connection' };
        default: return { label: type, cls: '' };
      }
    }

    function addEvent(type, data) {
      // 移除空状态
      if (emptyState) emptyState.remove();

      const tagInfo = getTagInfo(type);

      const item = document.createElement('div');
      item.className = 'event-item';
      item.innerHTML = `
        <div class="event-time">${formatTime(data.timestamp)}</div>
        <div class="event-tag ${tagInfo.cls}">${tagInfo.label}</div>
        <div>
          <div class="event-content">${escapeHtml(data.text || data.description || data.message || JSON.stringify(data))}</div>
          ${data.sessionId ? `<div class="event-session">${data.sessionId}</div>` : ''}
        </div>
      `;

      eventList.prepend(item);

      // 最多保留 100 条
      while (eventList.children.length > 101) {
        eventList.lastChild.remove();
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function connectSSE() {
      eventSource = new EventSource('/api/admin/stream');

      eventSource.onopen = () => {
        connected = true;
        statusDot.classList.remove('disconnected');
        statusText.textContent = '已连接';
        liveBadge.textContent = '● LIVE';
        liveBadge.classList.add('live');
        footerStatus.textContent = 'SSE 已连接';
      };

      eventSource.onerror = () => {
        connected = false;
        statusDot.classList.add('disconnected');
        statusText.textContent = '断开';
        liveBadge.textContent = '○ OFFLINE';
        liveBadge.classList.remove('live');
        footerStatus.textContent = '连接断开，正在重连...';
      };

      // 默认 message 事件
      eventSource.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'connected') {
            footerStatus.textContent = data.message;
          }
        } catch {}
      };

      // 命名事件
      eventSource.addEventListener('user_speech', (event) => {
        const data = JSON.parse(event.data);
        counts.speech++;
        lastSpeech = data.text?.length > 50 ? data.text.substring(0, 50) + '...' : data.text;
        updateStats();
        addEvent('user_speech', data);
      });

      eventSource.addEventListener('assistant_reply', (event) => {
        const data = JSON.parse(event.data);
        counts.reply++;
        updateStats();
        addEvent('assistant_reply', data);
      });

      eventSource.addEventListener('frame_analyzed', (event) => {
        const data = JSON.parse(event.data);
        counts.frame++;
        lastFrame = data.description;
        updateStats();
        addEvent('frame_analyzed', data);
      });

      eventSource.addEventListener('session_connected', (event) => {
        const data = JSON.parse(event.data);
        counts.session = data.onlineCount;
        updateStats();
        addEvent('session_connected', data);
      });

      eventSource.addEventListener('session_disconnected', (event) => {
        const data = JSON.parse(event.data);
        counts.session = data.onlineCount;
        updateStats();
        addEvent('session_disconnected', data);
      });
    }

    function clearEvents() {
      eventList.innerHTML = '';
      eventList.appendChild(emptyState);
    }

    // 启动
    connectSSE();
    setInterval(updateTime, 1000);
    updateTime();
  </script>
</body>
</html>
