<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 视觉对话助手 · 演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px 24px;
            display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a2a4a; }
  .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .status-dot.connected { background: #4ade80; box-shadow: 0 0 8px #4ade8080; }
  .status-dot.disconnected { background: #f87171; }
  .status-dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .main { display: flex; flex: 1; overflow: hidden; }
  .left-panel { width: 380px; min-width: 380px; display: flex; flex-direction: column;
                border-right: 1px solid #2a2a4a; background: #13132a; }
  .video-container { position: relative; background: #000; height: 260px; overflow: hidden; }
  .video-container video { width: 100%; height: 100%; object-fit: cover;
                           transform: scaleX(-1); /* mirror */ }
  .video-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column;
                       align-items: center; justify-content: center; color: #666;
                       background: #0a0a1a; gap: 8px; }
  .video-placeholder .icon { font-size: 48px; opacity: 0.5; }
  .video-placeholder .hint { font-size: 13px; }
  .controls { padding: 12px 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .controls button { padding: 8px 16px; border: 1px solid #3a3a5a; border-radius: 8px;
                     background: #1e1e3a; color: #e0e0e0; cursor: pointer; font-size: 13px;
                     transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .controls button:hover { background: #2a2a5a; border-color: #5a5a8a; }
  .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
  .controls button.active { background: #2d5a3a; border-color: #4ade80; }
  .controls button.danger { background: #5a2d2d; border-color: #f87171; }
  .frame-info { padding: 8px 16px; font-size: 12px; color: #888; border-top: 1px solid #2a2a4a; }
  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .messages .empty { text-align: center; color: #555; margin-top: 60px; font-size: 14px; }
  .message { max-width: 80%; padding: 10px 16px; border-radius: 16px; font-size: 14px;
             line-height: 1.5; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { align-self: flex-end; background: #2d4a7a; border-bottom-right-radius: 4px; }
  .message.assistant { align-self: flex-start; background: #2a2a4a; border-bottom-left-radius: 4px; }
  .message .role { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
  .input-area { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #2a2a4a;
                background: #13132a; }
  .input-area input { flex: 1; padding: 10px 16px; border: 1px solid #3a3a5a; border-radius: 24px;
                      background: #1a1a30; color: #e0e0e0; font-size: 14px; outline: none; }
  .input-area input:focus { border-color: #5a7aff; }
  .input-area button { padding: 8px 20px; border: none; border-radius: 24px;
                       background: #4a6aff; color: #fff; cursor: pointer; font-size: 14px;
                       transition: background 0.2s; }
  .input-area button:hover { background: #5a7aff; }
  .input-area button:disabled { background: #3a3a5a; cursor: not-allowed; }
  .config-bar { display: flex; gap: 12px; padding: 8px 16px; background: #0a0a18;
                border-bottom: 1px solid #2a2a4a; font-size: 12px; color: #888; align-items: center; }
  .config-bar input { background: #1a1a30; border: 1px solid #3a3a5a; border-radius: 4px;
                      color: #e0e0e0; padding: 4px 8px; font-size: 12px; width: 120px; }
  .config-bar label { display: flex; align-items: center; gap: 4px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 3px; }
  .log { padding: 8px 16px; border-top: 1px solid #2a2a4a; background: #0a0a18;
         font-size: 11px; color: #666; max-height: 80px; overflow-y: auto;
         font-family: monospace; }
</style>
</head>
<body>
<div class="header">
  <h1>🤖 AI 视觉对话助手 · 演示</h1>
  <span id="statusDot" class="status-dot disconnected"></span>
  <span id="statusText" style="font-size:13px;color:#888;">未连接</span>
  <span style="font-size:12px;color:#555;" id="sessionInfo"></span>
</div>
<div class="config-bar">
  <label>后端地址: <input id="serverUrl" value="ws://localhost:8000" placeholder="ws://host:port"></label>
  <button id="connectBtn" onclick="toggleConnect()" style="padding:4px 12px;font-size:12px;">连接</button>
  <span style="flex:1"></span>
  <label style="color:#666">📷 帧率: <select id="fpsSelect" onchange="updateFps()">
    <option value="2000">0.5 fps</option>
    <option value="1000" selected>1 fps</option>
    <option value="500">2 fps</option>
  </select></label>
</div>
<div class="main">
  <div class="left-panel">
    <div class="video-container">
      <video id="video" autoplay playsinline muted></video>
      <div class="video-placeholder" id="videoPlaceholder">
        <div class="icon">📷</div>
        <div class="hint">点击下方"打开摄像头"开始</div>
      </div>
    </div>
    <div class="controls">
      <button id="camBtn" onclick="toggleCamera()">📷 打开摄像头</button>
      <button id="micBtn" onclick="toggleMic()" disabled>🎤 麦克风</button>
      <button id="chatBtn" onclick="toggleChat()" disabled>💬 开始对话</button>
      <button id="snapshotBtn" onclick="sendSnapshot()" disabled>📸 发送当前帧</button>
    </div>
    <div class="frame-info" id="frameInfo">📡 帧: 等待中... | 🔍 视觉分析: 等待中...</div>
  </div>
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty">💬 输入文字或打开摄像头+麦克风开始对话</div>
    </div>
    <div class="input-area">
      <input id="chatInput" placeholder="输入文字与 AI 对话..." onkeydown="if(event.key==='Enter') sendChat()">
      <button id="sendBtn" onclick="sendChat()" disabled>发送</button>
    </div>
    <div class="log" id="logPanel">[系统] 页面已加载，点击"连接"以链接后端</div>
  </div>
</div>

<script>
// === State ===
let ws = null;
let sessionId = null;
let mediaStream = null;
let frameInterval = null;
let isCameraOn = false;
let isMicOn = false;
let isChatActive = false;
let audioRecorder = null;
let audioChunks = [];

// === Logging ===
function log(msg) {
  const el = document.getElementById('logPanel');
  const time = new Date().toLocaleTimeString();
  el.innerHTML = `[${time}] ${msg}<br>` + el.innerHTML;
  if (el.children.length > 50) el.removeChild(el.lastChild);
}

// === WebSocket ===
function getWsUrl() {
  const raw = document.getElementById('serverUrl').value.trim();
  // Allow user to enter http URL, auto-convert to ws
  return raw.replace(/^http:/, 'ws:').replace(/^https:/, 'wss:') + '/ws';
}

async function toggleConnect() {
  const btn = document.getElementById('connectBtn');
  if (ws && ws.readyState === WebSocket.OPEN) {
    disconnect();
    return;
  }
  await connect();
}

async function connect() {
  const baseUrl = getWsUrl();
  sessionId = crypto.randomUUID();
  const url = `${baseUrl}?session_id=${sessionId}`;

  setStatus('connecting', '连接中...');

  try {
    ws = new WebSocket(url);
  } catch(e) {
    log(`❌ 连接失败: ${e.message}`);
    setStatus('disconnected', '连接失败');
    return;
  }

  ws.onopen = () => {
    setStatus('connected', '已连接');
    log(`✅ WebSocket 已连接 (session: ${sessionId.slice(0,8)}...)`);
    document.getElementById('connectBtn').textContent = '断开';
    document.getElementById('chatBtn').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sessionInfo').textContent = `Session: ${sessionId.slice(0,8)}...`;
  };

  ws.onclose = () => {
    setStatus('disconnected', '未连接');
    log('🔌 WebSocket 已断开');
    document.getElementById('connectBtn').textContent = '连接';
    document.getElementById('chatBtn').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    ws = null;
  };

  ws.onerror = (e) => {
    log(`❌ WebSocket 错误`);
    setStatus('disconnected', '错误');
  };

  ws.onmessage = (event) => {
    if (event.data instanceof Blob) {
      // Binary audio data — play it
      const audioUrl = URL.createObjectURL(event.data);
      const audio = new Audio(audioUrl);
      audio.play().catch(e => log(`⚠️ 音频播放失败: ${e.message}`));
      log(`🔊 收到 TTS 音频 (${event.data.size} bytes)`);
      return;
    }

    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch(e) {
      log(`⚠️ 消息解析失败: ${e.message}`);
    }
  };
}

function disconnect() {
  if (ws) {
    ws.close();
    ws = null;
  }
  setStatus('disconnected', '未连接');
  document.getElementById('connectBtn').textContent = '连接';
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function sendJson(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

// === Message Handler ===
function handleMessage(msg) {
  switch(msg.type) {
    case 'connected':
      log(`✅ 会话已建立: ${msg.session_id}`);
      break;
    case 'user_message':
      addMessage(msg.text, 'user');
      break;
    case 'assistant_message':
      addMessage(msg.text, 'assistant');
      break;
    case 'frame_analyzed':
      document.getElementById('frameInfo').innerHTML =
        `📡 帧: 已发送 | 🔍 视觉分析: ${msg.description || '无描述'}`;
      log(`👁️ 画面分析: ${(msg.description || '').slice(0, 60)}...`);
      break;
    case 'control_ack':
      log(`🎮 控制命令已确认: ${msg.command}`);
      break;
    case 'pong':
      // keep-alive response
      break;
    default:
      log(`📨 未知消息: ${msg.type}`);
  }
}

function addMessage(text, role) {
  const container = document.getElementById('messages');
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const el = document.createElement('div');
  el.className = `message ${role}`;
  el.innerHTML = `<div class="role">${role === 'user' ? '🧑 你' : '🤖 AI'}</div>${escapeHtml(text)}`;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// === Camera ===
async function toggleCamera() {
  const btn = document.getElementById('camBtn');
  if (isCameraOn) {
    stopCamera();
    return;
  }
  await startCamera();
}

async function startCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: false,
    });
    const video = document.getElementById('video');
    video.srcObject = mediaStream;
    await video.play();
    isCameraOn = true;
    document.getElementById('camBtn').textContent = '📷 关闭摄像头';
    document.getElementById('camBtn').className = 'active';
    document.getElementById('videoPlaceholder').style.display = 'none';
    document.getElementById('snapshotBtn').disabled = false;
    document.getElementById('micBtn').disabled = false;
    log('📷 摄像头已开启');

    // Start sending frames
    startFrameCapture();
  } catch(e) {
    log(`❌ 摄像头启动失败: ${e.message}`);
    if (e.name === 'NotAllowedError') {
      alert('请允许摄像头权限后重试');
    }
  }
}

function stopCamera() {
  if (frameInterval) {
    clearInterval(frameInterval);
    frameInterval = null;
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  const video = document.getElementById('video');
  video.srcObject = null;
  isCameraOn = false;
  document.getElementById('camBtn').textContent = '📷 打开摄像头';
  document.getElementById('camBtn').className = '';
  document.getElementById('videoPlaceholder').style.display = 'flex';
  document.getElementById('snapshotBtn').disabled = true;
  document.getElementById('micBtn').disabled = true;
  log('📷 摄像头已关闭');
}

function startFrameCapture() {
  if (frameInterval) clearInterval(frameInterval);
  const interval = parseInt(document.getElementById('fpsSelect').value);
  frameInterval = setInterval(captureAndSendFrame, interval);
  log(`📸 帧采集已启动 (间隔 ${interval}ms)`);
}

function updateFps() {
  if (isCameraOn) startFrameCapture();
}

function captureAndSendFrame() {
  const video = document.getElementById('video');
  if (!video || !video.videoWidth) return;

  const canvas = document.createElement('canvas');
  canvas.width = 640;
  canvas.height = 480;
  const ctx = canvas.getContext('2d');
  // Mirror the image horizontally since we're using front camera
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  // Restore context
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  // Compress to JPEG
  const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
  sendJson({ type: 'frame', data: base64 });
}

function sendSnapshot() {
  captureAndSendFrame();
  log('📸 手动发送当前帧');
}

// === Microphone ===
async function toggleMic() {
  const btn = document.getElementById('micBtn');
  if (isMicOn) {
    stopMic();
    return;
  }
  await startMic();
}

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    isMicOn = true;
    btn.textContent = '🎤 关闭麦克风';
    btn.className = 'active';
    log('🎤 麦克风已开启');

    // Set up audio recording
    audioChunks = [];
    const options = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? { mimeType: 'audio/webm;codecs=opus' }
      : {};
    audioRecorder = new MediaRecorder(stream, options);

    audioRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) {
        audioChunks.push(e.data);
      }
    };

    audioRecorder.onstop = async () => {
      if (audioChunks.length > 0) {
        const blob = new Blob(audioChunks, { type: audioRecorder.mimeType });
        const reader = new FileReader();
        reader.onload = () => {
          const base64 = reader.result.split(',')[1];
          sendJson({ type: 'audio', data: base64 });
          log(`🎤 发送音频 (${(blob.size / 1024).toFixed(1)} KB)`);
        };
        reader.readAsDataURL(blob);
        audioChunks = [];
      }
    };

    // Record in 3-second chunks
    audioRecorder.start(3000);
    log('🎙️ 录音中 (每3秒发送一次)...');
  } catch(e) {
    log(`❌ 麦克风启动失败: ${e.message}`);
  }
}

function stopMic() {
  if (audioRecorder && audioRecorder.state !== 'inactive') {
    audioRecorder.stop();
  }
  if (audioRecorder && audioRecorder.stream) {
    audioRecorder.stream.getTracks().forEach(t => t.stop());
  }
  audioRecorder = null;
  audioChunks = [];
  isMicOn = false;
  document.getElementById('micBtn').textContent = '🎤 麦克风';
  document.getElementById('micBtn').className = '';
  log('🎤 麦克风已关闭');
}

// === Chat ===
function toggleChat() {
  if (isChatActive) {
    stopChat();
  } else {
    startChat();
  }
}

function startChat() {
  isChatActive = true;
  document.getElementById('chatBtn').textContent = '💬 结束对话';
  document.getElementById('chatBtn').className = 'danger';
  log('💬 对话已开始');
  addMessage('你好！我是 AI 视觉对话助手，有什么可以帮你的？', 'assistant');

  // Auto-start camera & mic if not already on
  if (!isCameraOn) startCamera();
  if (!isMicOn) startMic();
}

function stopChat() {
  isChatActive = false;
  document.getElementById('chatBtn').textContent = '💬 开始对话';
  document.getElementById('chatBtn').className = '';
  if (isMicOn) stopMic();
  log('💬 对话已结束');
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  sendJson({ type: 'test_chat', data: text });
  input.value = '';
  log(`📤 发送文字: ${text.slice(0, 40)}...`);
}

// === Keyboard shortcut ===
document.addEventListener('keydown', (e) => {
  // Ctrl+Enter to send even when not focused on input
  if (e.ctrlKey && e.key === 'Enter') {
    sendChat();
  }
});
</script>
</body>
</html>
